[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --headed
    --slowmo=300
    --browser=chromium
    --video=on
    --output=videos
    --html=pytest_report.html --self-contained-html

log_cli = true
log_cli_level = INFO

markers =
    smoke: fast health check
    regression: full suite execution